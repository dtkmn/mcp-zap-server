name: ZAP Security Gate
description: Run an MCP-backed ZAP scan flow in GitHub Actions, produce findings/report artifacts, and optionally fail on net-new findings.

inputs:
  target-url:
    description: Target URL that ZAP should scan. This must be reachable from the ZAP container.
    required: true
  baseline-file:
    description: Optional findings baseline JSON file from an expert-surface run. Guided self-serve flows skip baseline diff when snapshot tools are unavailable.
    required: false
    default: ""
  baseline-mode:
    description: Baseline handling mode. Use enforce for blocking gates; use seed for first-run baseline review when a diff may not exist yet.
    required: false
    default: "enforce"
  suppressions-file:
    description: Optional CI gate suppression contract JSON file applied after baseline/current snapshot normalization.
    required: false
    default: ""
  output-dir:
    description: Directory where gate artifacts will be written.
    required: false
    default: ".zap-artifacts"
  report-template:
    description: Report template hint. Expert mode passes this to zap_generate_report; guided mode maps it to html/json report format.
    required: false
    default: "traditional-html-plus"
  report-theme:
    description: Report theme passed to guided or expert report generation.
    required: false
    default: "light"
  run-active-scan:
    description: Whether to run the attack phase after crawl/spider completes.
    required: false
    default: "true"
  scan-policy:
    description: Optional active-scan policy name to pass to guided attack or expert active scan when supported.
    required: false
    default: ""
  fail-on-new-findings:
    description: Whether the action should fail if new findings exceed max-new-findings.
    required: false
    default: "true"
  max-new-findings:
    description: Allowed number of net-new findings before the gate fails.
    required: false
    default: "0"
  poll-interval-seconds:
    description: Poll interval for scan status checks.
    required: false
    default: "5"
  passive-timeout-seconds:
    description: Maximum passive scan wait time.
    required: false
    default: "180"
  spider-timeout-seconds:
    description: Maximum spider wait time before the gate fails.
    required: false
    default: "600"
  active-timeout-seconds:
    description: Maximum active-scan wait time before the gate fails.
    required: false
    default: "1200"
  start-stack:
    description: Start the bundled ZAP and MCP stack before running the gate.
    required: false
    default: "true"
  compose-override-file:
    description: Optional docker compose override file in the caller workspace for an app-under-test service.
    required: false
    default: ""
  compose-services:
    description: Space-delimited compose services to start when start-stack is true.
    required: false
    default: "zap mcp-server"
  local-zap-workspace-folder:
    description: Host path used for ZAP workspace, reports, and artifacts shared with containers.
    required: false
    default: ".zap-work"
  mcp-server-url:
    description: MCP streamable HTTP endpoint used by the helper script.
    required: false
    default: "http://localhost:7456/mcp"
  mcp-server-image:
    description: MCP server image ref used by the bundled CI compose stack. When start-stack is true, provide an immutable tag or digest.
    required: false
    default: ""
  zap-image:
    description: ZAP image ref used by the bundled CI compose stack.
    required: false
    default: "zaproxy/zap-stable:2.17.0"
  zap-api-key:
    description: Optional ZAP API key override. If omitted, the action generates an ephemeral key.
    required: false
    default: ""
  mcp-api-key:
    description: Optional MCP API key override. If omitted, the action generates an ephemeral key.
    required: false
    default: ""

outputs:
  new-findings:
    description: Net-new findings reported by findings diff when the active tool surface supports snapshot/diff.
    value: ${{ steps.gate.outputs.new_findings }}
  resolved-findings:
    description: Findings that were present in the baseline but not in the current run, when diff tools are available.
    value: ${{ steps.gate.outputs.resolved_findings }}
  baseline-used:
    description: Whether a baseline file was actually used. Guided self-serve flows may request a baseline but skip diff if snapshot tools are unavailable.
    value: ${{ steps.gate.outputs.baseline_used }}
  gate-passed:
    description: Whether the gate stayed within the configured tolerance.
    value: ${{ steps.gate.outputs.gate_passed }}
  summary-path:
    description: Path to the findings summary artifact.
    value: ${{ steps.gate.outputs.summary_path }}
  snapshot-path:
    description: Path to the current findings snapshot artifact when the active tool surface supports snapshot generation.
    value: ${{ steps.gate.outputs.snapshot_path }}
  diff-path:
    description: Path to the findings diff artifact when a baseline was used and diff tools were available.
    value: ${{ steps.gate.outputs.diff_path }}
  diff-json-path:
    description: Path to the machine-readable findings diff contract when a baseline was used.
    value: ${{ steps.gate.outputs.diff_json_path }}
  manifest-path:
    description: Path to the artifact manifest that ties the gate result, summary, diff, and report outputs together.
    value: ${{ steps.gate.outputs.manifest_path }}
  report-path:
    description: Container-side report path returned by guided or expert report generation.
    value: ${{ steps.gate.outputs.report_path }}
  report-local-path:
    description: Local copied report artifact path, when available.
    value: ${{ steps.gate.outputs.report_local_path }}
  metadata-path:
    description: Path to the versioned CI Gate Result v1 JSON emitted by the helper script.
    value: ${{ steps.gate.outputs.metadata_path }}

runs:
  using: composite
  steps:
    - id: gate
      shell: bash
      env:
        INPUT_TARGET_URL: ${{ inputs.target-url }}
        INPUT_BASELINE_FILE: ${{ inputs.baseline-file }}
        INPUT_BASELINE_MODE: ${{ inputs.baseline-mode }}
        INPUT_SUPPRESSIONS_FILE: ${{ inputs.suppressions-file }}
        INPUT_OUTPUT_DIR: ${{ inputs.output-dir }}
        INPUT_REPORT_TEMPLATE: ${{ inputs.report-template }}
        INPUT_REPORT_THEME: ${{ inputs.report-theme }}
        INPUT_RUN_ACTIVE_SCAN: ${{ inputs.run-active-scan }}
        INPUT_SCAN_POLICY: ${{ inputs.scan-policy }}
        INPUT_FAIL_ON_NEW_FINDINGS: ${{ inputs.fail-on-new-findings }}
        INPUT_MAX_NEW_FINDINGS: ${{ inputs.max-new-findings }}
        INPUT_POLL_INTERVAL_SECONDS: ${{ inputs.poll-interval-seconds }}
        INPUT_PASSIVE_TIMEOUT_SECONDS: ${{ inputs.passive-timeout-seconds }}
        INPUT_SPIDER_TIMEOUT_SECONDS: ${{ inputs.spider-timeout-seconds }}
        INPUT_ACTIVE_TIMEOUT_SECONDS: ${{ inputs.active-timeout-seconds }}
        INPUT_START_STACK: ${{ inputs.start-stack }}
        INPUT_COMPOSE_OVERRIDE_FILE: ${{ inputs.compose-override-file }}
        INPUT_COMPOSE_SERVICES: ${{ inputs.compose-services }}
        INPUT_LOCAL_ZAP_WORKSPACE_FOLDER: ${{ inputs.local-zap-workspace-folder }}
        INPUT_MCP_SERVER_URL: ${{ inputs.mcp-server-url }}
        INPUT_MCP_SERVER_IMAGE: ${{ inputs.mcp-server-image }}
        INPUT_ZAP_IMAGE: ${{ inputs.zap-image }}
        INPUT_ZAP_API_KEY: ${{ inputs.zap-api-key }}
        INPUT_MCP_API_KEY: ${{ inputs.mcp-api-key }}
      run: bash "${{ github.action_path }}/run-gate.sh"
