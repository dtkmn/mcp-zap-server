version: 2
updates:
  - package-ecosystem: "gradle"
    directory: "/" # Location of build.gradle files
    schedule:
      interval: "daily" # How often to check for updates
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "daily"
  - package-ecosystem: "npm"
    directory: "/docs"
    schedule:
      interval: "daily"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
