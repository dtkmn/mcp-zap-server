name: CI

env:
  DOCKER_REGISTRY: ghcr.io/${{ github.repository_owner }}
  IMAGE_NAME: mcp-zap-server

on:
  pull_request:
    types: [opened, reopened, synchronize, edited]
    branches: ["main", "dev"]
  push:
    branches: ["**"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: "25"
          distribution: temurin
          cache: gradle
          server-id: github
          settings-path: ${{ github.workspace }}

      - name: Validate Docker Compose manifests
        run: |
          repo_root="$PWD"
          assert_bind_count() {
            local file="$1"
            local needle="$2"
            local expected="$3"
            local actual
            actual="$(grep -F -c "$needle" "$file" || true)"
            if [ "$actual" -ne "$expected" ]; then
              echo "Expected $needle to appear $expected time(s) in $file, found $actual." >&2
              exit 1
            fi
          }
          ZAP_API_KEY="" docker compose --env-file /dev/null -f docker-compose.yml config >/tmp/compose-default-no-env.yaml
          assert_bind_count /tmp/compose-default-no-env.yaml "${repo_root}/zap-workplace/zap-wrk" 2
          assert_bind_count /tmp/compose-default-no-env.yaml "${repo_root}/zap-workplace/zap-home" 1
          docker compose --env-file .env.example -f docker-compose.yml config >/tmp/compose-default-env-example.yaml
          assert_bind_count /tmp/compose-default-env-example.yaml "${repo_root}/zap-workplace/zap-wrk" 2
          assert_bind_count /tmp/compose-default-env-example.yaml "${repo_root}/zap-workplace/zap-home" 1
          export LOCAL_ZAP_WORKPLACE_FOLDER="${RUNNER_TEMP}/zap-workplace"
          export ZAP_API_KEY="ci-zap-api-key"
          export MCP_API_KEY="ci-mcp-api-key"
          export JWT_SECRET="ci-jwt-secret-minimum-32-characters"
          mkdir -p "${LOCAL_ZAP_WORKPLACE_FOLDER}/zap-wrk" "${LOCAL_ZAP_WORKPLACE_FOLDER}/zap-home"
          docker compose -f docker-compose.yml config >/tmp/compose-default.yaml
          docker compose -f docker-compose.yml -f docker-compose.dev.yml config >/tmp/compose-dev.yaml
          docker compose -f docker-compose.yml -f docker-compose.prod.yml config >/tmp/compose-prod.yaml

      - name: Build with Gradle
        run: ./gradlew build --scan --no-daemon --stacktrace --info

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports
          if-no-files-found: ignore
          retention-days: 7
          path: |
            build/test-results/test/**
            build/reports/tests/test/**
            build/reports/problems/problems-report.html

  docker-publish:
    name: Publish branch images
    if: github.event_name == 'push' && (github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/main') && github.actor != 'dependabot[bot]'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    concurrency:
      group: docker-publish-${{ github.ref }}
      cancel-in-progress: true
    env:
      BRANCH_TAG: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v6

      - name: Get short SHA for image tagging
        id: build-tag
        run: echo "short_sha=$(git rev-parse --short "$GITHUB_SHA")" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ github.actor }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push branch images
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.BRANCH_TAG }}
            ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ steps.build-tag.outputs.short_sha }}
            ${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ env.BRANCH_TAG }}
            ${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:sha-${{ steps.build-tag.outputs.short_sha }}
