name: CI

env:
  DOCKER_REGISTRY: ghcr.io/${{ github.repository_owner }}
  IMAGE_NAME: mcp-zap-server

on:
  pull_request:
    types: [opened, reopened, synchronize, edited]
    branches: ["main", "dev"]
  push:
    branches: ["**"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up JDK 25
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          java-version: "25"
          distribution: temurin
          cache: gradle
          server-id: github
          settings-path: ${{ github.workspace }}

      - name: Validate Docker Compose manifests
        run: |
          repo_root="$PWD"
          assert_bind_count() {
            local file="$1"
            local needle="$2"
            local expected="$3"
            local actual
            actual="$(grep -F -c "$needle" "$file" || true)"
            if [ "$actual" -ne "$expected" ]; then
              echo "Expected $needle to appear $expected time(s) in $file, found $actual." >&2
              exit 1
            fi
          }
          ZAP_API_KEY="" docker compose --env-file /dev/null -f docker-compose.yml config >/tmp/compose-default-no-env.yaml
          assert_bind_count /tmp/compose-default-no-env.yaml "${repo_root}/zap-workplace/zap-wrk" 2
          assert_bind_count /tmp/compose-default-no-env.yaml "${repo_root}/zap-workplace/zap-home" 1
          docker compose --env-file .env.example -f docker-compose.yml config >/tmp/compose-default-env-example.yaml
          assert_bind_count /tmp/compose-default-env-example.yaml "${repo_root}/zap-workplace/zap-wrk" 2
          assert_bind_count /tmp/compose-default-env-example.yaml "${repo_root}/zap-workplace/zap-home" 1
          export LOCAL_ZAP_WORKPLACE_FOLDER="${RUNNER_TEMP}/zap-workplace"
          export ZAP_API_KEY="ci-zap-api-key"
          export MCP_API_KEY="ci-mcp-api-key"
          export JWT_SECRET="ci-jwt-secret-minimum-32-characters"
          mkdir -p "${LOCAL_ZAP_WORKPLACE_FOLDER}/zap-wrk" "${LOCAL_ZAP_WORKPLACE_FOLDER}/zap-home"
          docker compose -f docker-compose.yml config >/tmp/compose-default.yaml
          docker compose -f docker-compose.yml -f docker-compose.dev.yml config >/tmp/compose-dev.yaml
          docker compose -f docker-compose.yml -f docker-compose.prod.yml config >/tmp/compose-prod.yaml

      - name: Build with Gradle
        run: ./gradlew build --scan --no-daemon --stacktrace --info

      - name: Run Docker-backed integration tests
        if: >-
          github.event_name == 'workflow_dispatch' ||
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          (github.event_name == 'pull_request' && github.base_ref == 'main')
        run: ./gradlew dockerTest --scan --no-daemon --stacktrace --info

      - name: Verify extension API publication
        run: ./gradlew verifyExtensionApiPublication --scan --no-daemon --stacktrace --info

      - name: Verify standalone extension against staged API
        run: ./gradlew -p examples/extensions/standalone-policy-metadata-extension clean build --scan --no-daemon --stacktrace --info

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: test-reports
          if-no-files-found: ignore
          retention-days: 7
          path: |
            build/test-results/test/**
            build/test-results/dockerTest/**
            build/reports/tests/test/**
            build/reports/tests/dockerTest/**
            build/reports/problems/problems-report.html

  docker-publish:
    name: Publish main images
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && github.actor != 'dependabot[bot]'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    concurrency:
      group: docker-publish-${{ github.ref }}
      cancel-in-progress: true
    env:
      BRANCH_TAG: main
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@06fb636fac595d6fb4b28a5dfcb21a6f5091859c # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Login to Docker Hub
        uses: docker/login-action@06fb636fac595d6fb4b28a5dfcb21a6f5091859c # v4
        with:
          username: ${{ github.actor }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Build and push main images
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.BRANCH_TAG }}
            ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
            ${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ env.BRANCH_TAG }}
            ${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
