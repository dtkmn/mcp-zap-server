name: Release

env:
  IMAGE_NAME: mcp-zap-server

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  docker-release:
    name: Publish release images and archive SBOM
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release metadata
        id: vars
        env:
          RELEASE_VERSION: ${{ github.event.release.tag_name }}
          RELEASE_IS_PRERELEASE: ${{ github.event.release.prerelease }}
          RELEASE_IS_IMMUTABLE: ${{ github.event.release.immutable }}
        run: |
          set -euo pipefail

          if [ "$RELEASE_IS_IMMUTABLE" != "true" ]; then
            echo "GitHub immutable releases must be enabled before publication" >&2
            exit 1
          fi

          if [[ ! "$RELEASE_VERSION" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$ ]]; then
            echo "Release version must be a strict vMAJOR.MINOR.PATCH tag with an optional prerelease suffix" >&2
            exit 1
          fi

          publish_latest=true
          if [ "$RELEASE_IS_PRERELEASE" = "true" ] || [[ "$RELEASE_VERSION" == *-* ]]; then
            publish_latest=false
          fi

          printf 'version=%s\n' "$RELEASE_VERSION" >> "$GITHUB_OUTPUT"
          printf 'publish_latest=%s\n' "$publish_latest" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Verify release tag, commit, and project version
        env:
          RELEASE_VERSION: ${{ steps.vars.outputs.version }}
          EXPECTED_COMMIT: ${{ github.sha }}
        run: |
          set -euo pipefail

          if [[ ! "$EXPECTED_COMMIT" =~ ^[0-9a-f]{40}$ ]]; then
            echo "Release event commit must be a full lowercase SHA-1" >&2
            exit 1
          fi

          tag_commit="$(git rev-parse --verify "refs/tags/${RELEASE_VERSION}^{commit}")"
          head_commit="$(git rev-parse HEAD)"
          test "$head_commit" = "$EXPECTED_COMMIT" || {
            echo "Checked-out HEAD must equal the release event commit" >&2
            exit 1
          }
          test "$tag_commit" = "$EXPECTED_COMMIT" || {
            echo "${RELEASE_VERSION} must still reference the release event commit" >&2
            exit 1
          }

          git rev-parse --verify "refs/remotes/origin/main^{commit}" >/dev/null || {
            echo "origin/main is unavailable; refusing to execute release code" >&2
            exit 1
          }
          git merge-base --is-ancestor "$EXPECTED_COMMIT" refs/remotes/origin/main || {
            echo "Release event commit must be reachable from origin/main" >&2
            exit 1
          }

          project_version="$(sed -n "s/^version = '\([^']*\)'$/\1/p" build.gradle)"
          test -n "$project_version"
          test "$RELEASE_VERSION" = "v${project_version}" || {
            echo "Release tag must be v${project_version}" >&2
            exit 1
          }

      - name: Set up JDK 25
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          java-version: "25"
          distribution: temurin
          cache: gradle
          server-id: github
          settings-path: ${{ github.workspace }}

      - name: Validate Docker Compose manifests
        run: |
          repo_root="$PWD"
          assert_bind_count() {
            local file="$1"
            local needle="$2"
            local expected="$3"
            local actual
            actual="$(grep -F -c "$needle" "$file" || true)"
            if [ "$actual" -ne "$expected" ]; then
              echo "Expected $needle to appear $expected time(s) in $file, found $actual." >&2
              exit 1
            fi
          }
          ZAP_API_KEY="" docker compose --env-file /dev/null -f docker-compose.yml config >/tmp/compose-default-no-env.yaml
          assert_bind_count /tmp/compose-default-no-env.yaml "${repo_root}/zap-workplace/zap-wrk" 2
          assert_bind_count /tmp/compose-default-no-env.yaml "${repo_root}/zap-workplace/zap-home" 1
          docker compose --env-file .env.example -f docker-compose.yml config >/tmp/compose-default-env-example.yaml
          assert_bind_count /tmp/compose-default-env-example.yaml "${repo_root}/zap-workplace/zap-wrk" 2
          assert_bind_count /tmp/compose-default-env-example.yaml "${repo_root}/zap-workplace/zap-home" 1
          export LOCAL_ZAP_WORKPLACE_FOLDER="${RUNNER_TEMP}/zap-workplace"
          export ZAP_API_KEY="ci-zap-api-key"
          export MCP_API_KEY="ci-mcp-api-key"
          export JWT_SECRET="ci-jwt-secret-minimum-32-characters"
          mkdir -p "${LOCAL_ZAP_WORKPLACE_FOLDER}/zap-wrk" "${LOCAL_ZAP_WORKPLACE_FOLDER}/zap-home"
          docker compose -f docker-compose.yml config >/tmp/compose-default.yaml
          docker compose -f docker-compose.yml -f docker-compose.dev.yml config >/tmp/compose-dev.yaml
          docker compose -f docker-compose.yml -f docker-compose.prod.yml config >/tmp/compose-prod.yaml

      - name: Build with Gradle and generate SBOM
        run: ./gradlew build cyclonedxBom --scan --no-daemon --stacktrace --info

      - name: Run Docker-backed integration tests
        run: ./gradlew dockerTest --scan --no-daemon --stacktrace --info

      - name: Verify extension API publication
        run: ./gradlew verifyExtensionApiPublication --scan --no-daemon --stacktrace --info

      - name: Verify standalone extension against staged API
        run: ./gradlew -p examples/extensions/standalone-policy-metadata-extension clean build --scan --no-daemon --stacktrace --info

      - name: Archive SBOM workflow artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: sbom-${{ steps.vars.outputs.version }}
          path: build/reports/cyclonedx-direct/bom.json
          if-no-files-found: error

      - name: Compute release image tags
        id: image-tags
        env:
          RELEASE_VERSION: ${{ steps.vars.outputs.version }}
          PUBLISH_LATEST: ${{ steps.vars.outputs.publish_latest }}
          GHCR_IMAGE: ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          DOCKER_HUB_IMAGE: ${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
        run: |
          set -euo pipefail

          {
            echo "tags<<EOF"
            echo "${GHCR_IMAGE}:${RELEASE_VERSION}"
            echo "${DOCKER_HUB_IMAGE}:${RELEASE_VERSION}"

            if [ "$PUBLISH_LATEST" = "true" ]; then
              echo "${GHCR_IMAGE}:latest"
              echo "${DOCKER_HUB_IMAGE}:latest"
            fi

            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Login to Docker Hub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          username: ${{ github.actor }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Build and push release images
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ${{ steps.image-tags.outputs.tags }}
