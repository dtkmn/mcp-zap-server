name: Release

env:
  IMAGE_NAME: mcp-zap-server

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to build (tag, branch, or commit SHA)
        required: true
        type: string
      version:
        description: Version tag to publish
        required: true
        type: string
      publish_latest:
        description: Also update the latest tag
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  docker-release:
    name: Publish release images and SBOM
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - name: Resolve release metadata
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "publish_latest=${{ inputs.publish_latest }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF##*/}" >> "$GITHUB_OUTPUT"
            echo "publish_latest=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: "25"
          distribution: temurin
          cache: gradle
          server-id: github
          settings-path: ${{ github.workspace }}

      - name: Validate Docker Compose manifests
        run: |
          repo_root="$PWD"
          assert_bind_count() {
            local file="$1"
            local needle="$2"
            local expected="$3"
            local actual
            actual="$(grep -F -c "$needle" "$file" || true)"
            if [ "$actual" -ne "$expected" ]; then
              echo "Expected $needle to appear $expected time(s) in $file, found $actual." >&2
              exit 1
            fi
          }
          ZAP_API_KEY="" docker compose --env-file /dev/null -f docker-compose.yml config >/tmp/compose-default-no-env.yaml
          assert_bind_count /tmp/compose-default-no-env.yaml "${repo_root}/zap-workplace/zap-wrk" 2
          assert_bind_count /tmp/compose-default-no-env.yaml "${repo_root}/zap-workplace/zap-home" 1
          docker compose --env-file .env.example -f docker-compose.yml config >/tmp/compose-default-env-example.yaml
          assert_bind_count /tmp/compose-default-env-example.yaml "${repo_root}/zap-workplace/zap-wrk" 2
          assert_bind_count /tmp/compose-default-env-example.yaml "${repo_root}/zap-workplace/zap-home" 1
          export LOCAL_ZAP_WORKPLACE_FOLDER="${RUNNER_TEMP}/zap-workplace"
          export ZAP_API_KEY="ci-zap-api-key"
          export MCP_API_KEY="ci-mcp-api-key"
          export JWT_SECRET="ci-jwt-secret-minimum-32-characters"
          mkdir -p "${LOCAL_ZAP_WORKPLACE_FOLDER}/zap-wrk" "${LOCAL_ZAP_WORKPLACE_FOLDER}/zap-home"
          docker compose -f docker-compose.yml config >/tmp/compose-default.yaml
          docker compose -f docker-compose.yml -f docker-compose.dev.yml config >/tmp/compose-dev.yaml
          docker compose -f docker-compose.yml -f docker-compose.prod.yml config >/tmp/compose-prod.yaml

      - name: Build with Gradle and generate SBOM
        run: ./gradlew build cyclonedxBom --scan --no-daemon --stacktrace --info

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v7
        with:
          name: sbom-${{ steps.vars.outputs.version }}
          path: build/reports/cyclonedx-direct/bom.json

      - name: Compute release image tags
        id: image-tags
        run: |
          version="${{ steps.vars.outputs.version }}"

          {
            echo "tags<<EOF"
            echo "ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${version}"
            echo "${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${version}"

            if [ "${{ steps.vars.outputs.publish_latest }}" = "true" ]; then
              echo "ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest"
              echo "${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest"
            fi

            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ github.actor }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push release images
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ${{ steps.image-tags.outputs.tags }}
