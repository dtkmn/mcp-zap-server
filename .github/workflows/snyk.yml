name: Snyk Security

on:
  pull_request:
    branches: ["main", "dev"]
  push:
    branches: ["main", "dev"]
  schedule:
    - cron: "43 4 * * 2"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: snyk-${{ github.ref }}
  cancel-in-progress: true

env:
  SNYK_SEVERITY_THRESHOLD: high

jobs:
  open-source:
    name: Open source dependencies
    if: github.actor != 'dependabot[bot]' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: "25"
          distribution: temurin
          cache: gradle

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Set up Snyk CLI
        uses: snyk/actions/setup@master

      - name: Require Snyk token
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          if [ -z "${SNYK_TOKEN:-}" ]; then
            echo "::error::SNYK_TOKEN repository secret is required for Snyk scans."
            exit 1
          fi

      - name: Run Snyk Open Source test
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          SNYK_ORG: ${{ vars.SNYK_ORG }}
        run: |
          org_args=()
          if [ -n "${SNYK_ORG:-}" ]; then
            org_args+=(--org="${SNYK_ORG}")
          fi

          snyk test \
            --all-projects \
            --severity-threshold="${SNYK_SEVERITY_THRESHOLD}" \
            --sarif-file-output=snyk-open-source.sarif \
            "${org_args[@]}"

      - name: Upload Snyk Open Source SARIF
        if: always() && hashFiles('snyk-open-source.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: snyk-open-source.sarif
          category: snyk-open-source

      - name: Monitor open-source dependencies
        if: github.event_name != 'pull_request'
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          SNYK_ORG: ${{ vars.SNYK_ORG }}
        run: |
          org_args=()
          if [ -n "${SNYK_ORG:-}" ]; then
            org_args+=(--org="${SNYK_ORG}")
          fi

          snyk monitor --all-projects "${org_args[@]}"

  container:
    name: Container image
    if: github.actor != 'dependabot[bot]' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    env:
      IMAGE_REF: mcp-zap-server:snyk-${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Snyk CLI
        uses: snyk/actions/setup@master

      - name: Require Snyk token
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          if [ -z "${SNYK_TOKEN:-}" ]; then
            echo "::error::SNYK_TOKEN repository secret is required for Snyk scans."
            exit 1
          fi

      - name: Build image for container scan
        run: docker build --pull -t "${IMAGE_REF}" .

      - name: Run Snyk Container test
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          SNYK_ORG: ${{ vars.SNYK_ORG }}
        run: |
          org_args=()
          if [ -n "${SNYK_ORG:-}" ]; then
            org_args+=(--org="${SNYK_ORG}")
          fi

          snyk container test "${IMAGE_REF}" \
            --file=Dockerfile \
            --app-vulns \
            --severity-threshold="${SNYK_SEVERITY_THRESHOLD}" \
            --sarif-file-output=snyk-container.sarif \
            "${org_args[@]}"

      - name: Upload Snyk Container SARIF
        if: always() && hashFiles('snyk-container.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: snyk-container.sarif
          category: snyk-container

      - name: Monitor container image
        if: github.event_name != 'pull_request'
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          SNYK_ORG: ${{ vars.SNYK_ORG }}
        run: |
          org_args=()
          if [ -n "${SNYK_ORG:-}" ]; then
            org_args+=(--org="${SNYK_ORG}")
          fi

          snyk container monitor "${IMAGE_REF}" \
            --file=Dockerfile \
            --app-vulns \
            "${org_args[@]}"

  infrastructure-as-code:
    name: Rendered Helm manifests
    if: github.actor != 'dependabot[bot]' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Set up Snyk CLI
        uses: snyk/actions/setup@master

      - name: Require Snyk token
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          if [ -z "${SNYK_TOKEN:-}" ]; then
            echo "::error::SNYK_TOKEN repository secret is required for Snyk scans."
            exit 1
          fi

      - name: Render Helm chart
        run: |
          helm template mcp-zap-server helm/mcp-zap-server \
            --values helm/mcp-zap-server/values-ci.yaml \
            --output-dir snyk-rendered-helm

      - name: Run Snyk IaC test
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          SNYK_ORG: ${{ vars.SNYK_ORG }}
        run: |
          org_args=()
          if [ -n "${SNYK_ORG:-}" ]; then
            org_args+=(--org="${SNYK_ORG}")
          fi

          snyk iac test snyk-rendered-helm \
            --severity-threshold="${SNYK_SEVERITY_THRESHOLD}" \
            --sarif-file-output=snyk-iac.sarif \
            "${org_args[@]}"

      - name: Upload Snyk IaC SARIF
        if: always() && hashFiles('snyk-iac.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: snyk-iac.sarif
          category: snyk-iac
