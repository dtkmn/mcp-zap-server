services:
  zap:
    image: zaproxy/zap-stable
    restart: always
    command:
      - zap.sh
      - -daemon
      - -host
      - 0.0.0.0
      - -port
      - "8090"
      - -config
      - api.key=${ZAP_API_KEY}
      - -config
      - api.addrs.addr.name=.*
      - -config
      - api.addrs.addr.regex=true
      - -addoninstall
      - spiderAjax
    ports:
      - "${MCP_ZAP_BIND_ADDRESS:-127.0.0.1}:8090:8090"
    environment:
      ZAP_API_KEY: ${ZAP_API_KEY}
      ZAP_MEMORY: ${ZAP_MEMORY:-4G}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS \"http://127.0.0.1:8090/JSON/core/view/version/?apikey=$$ZAP_API_KEY\" >/dev/null",
        ]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 30s
    volumes:
      - ${LOCAL_ZAP_WORKPLACE_FOLDER:-./zap-workplace}/zap-wrk:/zap/wrk
      - ${LOCAL_ZAP_WORKPLACE_FOLDER:-./zap-workplace}/zap-home:/home/zap/.ZAP

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    depends_on:
      mcp-server:
        condition: service_started
    ports:
      - "${MCP_ZAP_BIND_ADDRESS:-127.0.0.1}:3000:8080"
    environment:
      TOOL_SERVER_CONNECTIONS: >-
        [{"url":"http://mcp-server:7456/mcp","path":"","type":"mcp","auth_type":"none","headers":{"X-API-Key":"${MCP_API_KEY:-change-me-to-secure-random-key}"},"config":{"enable":true},"info":{"id":"zap-security","name":"ZAP Security","description":"OWASP ZAP scanning and reporting tools exposed by the local MCP server."}}]
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    volumes:
      - open-webui:/app/backend/data

  mcp-server:
    build:
      context: .
      dockerfile: ${DOCKERFILE:-Dockerfile}  # Use Dockerfile.native for native image
    image: dtkmn/mcp-zap-server:${IMAGE_TAG:-latest}
    restart: always
    depends_on:
      zap:
        condition: service_healthy
    ports:
      - "${MCP_ZAP_BIND_ADDRESS:-127.0.0.1}:7456:7456"
    environment:
      ZAP_API_URL: zap
      ZAP_API_PORT: 8090
      ZAP_API_KEY: ${ZAP_API_KEY:-ZAP_API_KEY}
      MCP_API_KEY: ${MCP_API_KEY:-changeme-default-key}
      MCP_SECURITY_MODE: ${MCP_SECURITY_MODE:-api-key}
      MCP_SECURITY_ENABLED: ${MCP_SECURITY_ENABLED:-true}
      MCP_SECURITY_ALLOW_PLACEHOLDER_API_KEY: ${MCP_SECURITY_ALLOW_PLACEHOLDER_API_KEY:-true}
      ZAP_MAX_ACTIVE_SCAN_DURATION: ${ZAP_MAX_ACTIVE_SCAN_DURATION:-30}
      ZAP_MAX_SPIDER_SCAN_DURATION: ${ZAP_MAX_SPIDER_SCAN_DURATION:-15}
      ZAP_MAX_CONCURRENT_ACTIVE_SCANS: ${ZAP_MAX_CONCURRENT_ACTIVE_SCANS:-3}
      ZAP_MAX_CONCURRENT_SPIDER_SCANS: ${ZAP_MAX_CONCURRENT_SPIDER_SCANS:-5}
      ZAP_SCAN_QUEUE_DISPATCH_INTERVAL_MS: ${ZAP_SCAN_QUEUE_DISPATCH_INTERVAL_MS:-2000}
      ZAP_SCAN_QUEUE_VIRTUAL_THREADS_ENABLED: ${ZAP_SCAN_QUEUE_VIRTUAL_THREADS_ENABLED:-false}
      ZAP_SCAN_QUEUE_COORDINATOR_BACKEND: ${ZAP_SCAN_QUEUE_COORDINATOR_BACKEND:-single-node}
      ZAP_SCAN_QUEUE_COORDINATOR_NODE_ID: ${ZAP_SCAN_QUEUE_COORDINATOR_NODE_ID:-mcp-server}
      ZAP_SCAN_QUEUE_COORDINATOR_POSTGRES_URL: ${ZAP_SCAN_QUEUE_COORDINATOR_POSTGRES_URL:-}
      ZAP_SCAN_QUEUE_COORDINATOR_POSTGRES_USERNAME: ${ZAP_SCAN_QUEUE_COORDINATOR_POSTGRES_USERNAME:-}
      ZAP_SCAN_QUEUE_COORDINATOR_POSTGRES_PASSWORD: ${ZAP_SCAN_QUEUE_COORDINATOR_POSTGRES_PASSWORD:-}
      ZAP_SCAN_QUEUE_COORDINATOR_POSTGRES_ADVISORY_LOCK_KEY: ${ZAP_SCAN_QUEUE_COORDINATOR_POSTGRES_ADVISORY_LOCK_KEY:-861001}
      ZAP_SCAN_QUEUE_COORDINATOR_POSTGRES_HEARTBEAT_INTERVAL_MS: ${ZAP_SCAN_QUEUE_COORDINATOR_POSTGRES_HEARTBEAT_INTERVAL_MS:-5000}
      ZAP_SCAN_QUEUE_COORDINATOR_POSTGRES_FAIL_FAST: ${ZAP_SCAN_QUEUE_COORDINATOR_POSTGRES_FAIL_FAST:-false}
      ZAP_SCAN_QUEUE_RETRY_ACTIVE_MAX_ATTEMPTS: ${ZAP_SCAN_QUEUE_RETRY_ACTIVE_MAX_ATTEMPTS:-3}
      ZAP_SCAN_QUEUE_RETRY_ACTIVE_INITIAL_BACKOFF_MS: ${ZAP_SCAN_QUEUE_RETRY_ACTIVE_INITIAL_BACKOFF_MS:-2000}
      ZAP_SCAN_QUEUE_RETRY_ACTIVE_MAX_BACKOFF_MS: ${ZAP_SCAN_QUEUE_RETRY_ACTIVE_MAX_BACKOFF_MS:-30000}
      ZAP_SCAN_QUEUE_RETRY_ACTIVE_MULTIPLIER: ${ZAP_SCAN_QUEUE_RETRY_ACTIVE_MULTIPLIER:-2.0}
      ZAP_SCAN_QUEUE_RETRY_SPIDER_MAX_ATTEMPTS: ${ZAP_SCAN_QUEUE_RETRY_SPIDER_MAX_ATTEMPTS:-2}
      ZAP_SCAN_QUEUE_RETRY_SPIDER_INITIAL_BACKOFF_MS: ${ZAP_SCAN_QUEUE_RETRY_SPIDER_INITIAL_BACKOFF_MS:-1000}
      ZAP_SCAN_QUEUE_RETRY_SPIDER_MAX_BACKOFF_MS: ${ZAP_SCAN_QUEUE_RETRY_SPIDER_MAX_BACKOFF_MS:-10000}
      ZAP_SCAN_QUEUE_RETRY_SPIDER_MULTIPLIER: ${ZAP_SCAN_QUEUE_RETRY_SPIDER_MULTIPLIER:-2.0}
      ZAP_SCAN_JOBS_STORE_BACKEND: ${ZAP_SCAN_JOBS_STORE_BACKEND:-in-memory}
      ZAP_SCAN_JOBS_STORE_POSTGRES_URL: ${ZAP_SCAN_JOBS_STORE_POSTGRES_URL:-}
      ZAP_SCAN_JOBS_STORE_POSTGRES_USERNAME: ${ZAP_SCAN_JOBS_STORE_POSTGRES_USERNAME:-}
      ZAP_SCAN_JOBS_STORE_POSTGRES_PASSWORD: ${ZAP_SCAN_JOBS_STORE_POSTGRES_PASSWORD:-}
      ZAP_SCAN_JOBS_STORE_POSTGRES_TABLE_NAME: ${ZAP_SCAN_JOBS_STORE_POSTGRES_TABLE_NAME:-scan_jobs}
      ZAP_SCAN_JOBS_STORE_POSTGRES_FAIL_FAST: ${ZAP_SCAN_JOBS_STORE_POSTGRES_FAIL_FAST:-false}
      ZAP_URL_VALIDATION_ENABLED: ${ZAP_URL_VALIDATION_ENABLED:-true}
      ZAP_ALLOW_LOCALHOST: ${ZAP_ALLOW_LOCALHOST:-true}
      ZAP_ALLOW_PRIVATE_NETWORKS: ${ZAP_ALLOW_PRIVATE_NETWORKS:-true}
      ZAP_URL_WHITELIST: ${ZAP_URL_WHITELIST:-}
    volumes:
      - ${LOCAL_ZAP_WORKPLACE_FOLDER:-./zap-workplace}/zap-wrk:/zap/wrk

  juice-shop:
    image: bkimminich/juice-shop:v19.1.1
    restart: always
    ports:
      - "${MCP_ZAP_BIND_ADDRESS:-127.0.0.1}:3001:3000"

  petstore:
    image: swaggerapi/petstore3:1.0.27
    restart: always
    ports:
      - "${MCP_ZAP_BIND_ADDRESS:-127.0.0.1}:3002:8080"

volumes:
  open-webui:
