{{- if and .Values.mcp.enabled .Values.networkPolicy.mcp.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "mcp-zap-server.fullname" . }}-mcp
  labels:
    {{- include "mcp-zap-server.mcp.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "mcp-zap-server.mcp.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        {{- if .Values.networkPolicy.mcp.allowSameNamespace }}
        - podSelector: {}
        {{- end }}
        {{- with .Values.networkPolicy.mcp.extraIngress }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      ports:
        - protocol: TCP
          port: {{ .Values.mcp.service.targetPort }}
{{- end }}
