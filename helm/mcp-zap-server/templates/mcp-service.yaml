{{- if .Values.mcp.enabled }}
{{- $sessionAffinity := .Values.mcp.streamableHttp.sessionAffinity }}
{{- $sessionAffinityProvider := trimAll " " (default "" $sessionAffinity.provider) }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "mcp-zap-server.fullname" . }}-mcp
  labels:
    {{- include "mcp-zap-server.mcp.labels" . | nindent 4 }}
  {{- $serviceAnnotations := include "mcp-zap-server.mcp.serviceAnnotations" . | fromYaml }}
  {{- with $serviceAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.mcp.service.type }}
  {{- if and $sessionAffinity.enabled (eq $sessionAffinityProvider "service-client-ip") }}
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: {{ $sessionAffinity.serviceClientIp.timeoutSeconds }}
  {{- end }}
  ports:
  - port: {{ .Values.mcp.service.port }}
    targetPort: {{ .Values.mcp.service.targetPort }}
    protocol: TCP
    name: http
  selector:
    {{- include "mcp-zap-server.mcp.selectorLabels" . | nindent 4 }}
{{- end }}
