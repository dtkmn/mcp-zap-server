# Secure deployment example using pre-created Kubernetes Secrets.
# Keep secret values out of Helm values and inject them through your deployment pipeline.

global:
  environment: secure

zap:
  service:
    type: ClusterIP
  config:
    existingSecret:
      name: mcp-zap-runtime
      apiKeyKey: ZAP_API_KEY

mcp:
  service:
    type: ClusterIP
  streamableHttp:
    sessionAffinity:
      enabled: true
      provider: service-client-ip
  ingress:
    enabled: false
  security:
    mode: jwt
    enabled: true
    allowPlaceholderApiKey: false
    existingSecret:
      name: mcp-zap-runtime
      apiKeyKey: MCP_API_KEY
      jwtSecretKey: JWT_SECRET
    jwt:
      enabled: true
  zapClient:
    existingSecret:
      name: mcp-zap-runtime
      apiKeyKey: ZAP_API_KEY
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 6

networkPolicy:
  zap:
    enabled: true
