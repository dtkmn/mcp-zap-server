<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">MCP ZAP Server logo</title>
  <desc id="desc">A shield with connected MCP nodes, a scanning lens, and a lightning mark.</desc>
  <defs>
    <linearGradient id="bg" x1="120" y1="80" x2="904" y2="944" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#07111F"/>
      <stop offset="0.58" stop-color="#0B1628"/>
      <stop offset="1" stop-color="#10243A"/>
    </linearGradient>
    <linearGradient id="shield" x1="262" y1="132" x2="762" y2="832" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#35D4FF"/>
      <stop offset="0.48" stop-color="#238BFF"/>
      <stop offset="1" stop-color="#2557D6"/>
    </linearGradient>
    <linearGradient id="bolt" x1="577" y1="320" x2="704" y2="565" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFF07A"/>
      <stop offset="1" stop-color="#FFB02E"/>
    </linearGradient>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="24" stdDeviation="22" flood-color="#020713" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1024" height="1024" rx="192" fill="url(#bg)"/>

