  <path d="M291 363l107 112-83 128 139 77 116-119" fill="none" stroke="#07111F" stroke-width="54" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M291 363l107 112-83 128 139 77 116-119" fill="none" stroke="#EAFBFF" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"/>

  <g stroke="#07111F" stroke-width="28">
    <circle cx="291" cy="363" r="44" fill="#EAFBFF"/>
    <circle cx="398" cy="475" r="44" fill="#EAFBFF"/>
    <circle cx="315" cy="603" r="44" fill="#EAFBFF"/>
