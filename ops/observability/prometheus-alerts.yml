groups:
  - name: mcp-zap-server-observability
    rules:
      - alert: AsgAuthenticationFailuresBurst
        expr: sum(rate(asg_auth_events_total{outcome="failure"}[10m])) by (method, reason) > 0.2
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Authentication failures are elevated"
          description: "Authentication failures have remained above the warning threshold for 15 minutes."

      - alert: AsgProtectionRejectionsSustained
        expr: sum(rate(asg_protection_rejections_total[10m])) by (error, reason) > 0.1
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "MCP protection layer is rejecting requests"
          description: "Rate limiting, workspace quotas, or overload shedding has been sustained for 15 minutes."

      - alert: AsgQueueBacklogSustained
        expr: asg_queue_jobs{status="queued"} > 10
        for: 20m
        labels:
          severity: warning
        annotations:
          summary: "Queued scan backlog is growing"
          description: "Queued scan jobs have stayed above 10 for 20 minutes."

      - alert: AsgToolFailuresPresent
        expr: sum(rate(asg_tool_executions_seconds_count{outcome="failure"}[15m])) by (tool) > 0
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Tool execution failures detected"
          description: "One or more MCP tools are failing repeatedly over the last 15 minutes."
